version: '3.8'

services:
  # ============================================================================
  # DATABASE
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: smartbridge_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-smartbridge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-smartbridge_prod}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_stat_statements -c max_connections=200"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./infra/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./infra/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - smartbridge_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartbridge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # BACKEND API SERVER
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: production
    container_name: smartbridge_backend_prod
    restart: always
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-smartbridge}:${DB_PASSWORD:-change_me_in_production}@postgres:5432/${DB_NAME:-smartbridge_prod}
      # Security
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      API_KEY: ${API_KEY:-demo-api-key-change}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-demo-admin-key-change-in-production}
      # Environment
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      # AI
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_FALLBACK_ENABLED: "true"
      # Monitoring
      PROMETHEUS_ENABLED: "true"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
      - ./audit_logs:/app/audit_logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartbridge_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # PROMETHEUS
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: smartbridge_prometheus_prod
    restart: always
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_prod:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - smartbridge_prod
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # GRAFANA
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: smartbridge_grafana_prod
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-change_me_in_production}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data_prod:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboard.json:/etc/grafana/dashboards/main.json:ro
    ports:
      - "3000:3000"
    networks:
      - smartbridge_prod
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # OPTIONAL: pgAdmin for database management
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartbridge_pgadmin_prod
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@smartbridge.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-change_me_in_production}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data_prod:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - smartbridge_prod
    depends_on:
      - postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local
  prometheus_data_prod:
    driver: local
  grafana_data_prod:
    driver: local
  pgadmin_data_prod:
    driver: local

networks:
  smartbridge_prod:
    driver: bridge
