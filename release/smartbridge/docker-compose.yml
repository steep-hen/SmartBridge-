version: '3.8'

services:
  # PostgreSQL database service
  postgres:
    image: postgres:15-alpine
    container_name: ai-advisor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_advisor_dev
    ports:
      - "5432:5432"
    volumes:
      # Persist database data between container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-advisor-network

  # FastAPI backend service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-advisor-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      # Load from .env file
      DEBUG: "true"
      ENVIRONMENT: "development"
      APP_ENV: "development"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/ai_advisor_dev"
      POSTGRES_URL: "postgresql://postgres:postgres@postgres:5432/ai_advisor_dev"
      API_PORT: "8000"
      API_HOST: "0.0.0.0"
      SECRET_KEY: "dev-secret-key-change-in-production"
      # Optional: Set GEMINI_API_KEY to enable AI advice from Gemini
      # GEMINI_API_KEY: "your-gemini-api-key"
    volumes:
      # Mount source code for hot-reload during development
      - ./backend:/app/backend
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-advisor-network
    restart: unless-stopped

  # Streamlit frontend service (optional, usually run separately)
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: frontend/Dockerfile
  #   container_name: ai-advisor-frontend
  #   ports:
  #     - "8501:8501"
  #   environment:
  #     BACKEND_URL: "http://backend:8000"
  #   depends_on:
  #     - backend
  #   networks:
  #     - ai-advisor-network

volumes:
  postgres_data:
    driver: local

networks:
  ai-advisor-network:
    driver: bridge
